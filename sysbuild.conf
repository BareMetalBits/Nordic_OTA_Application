# ── sysbuild.conf (project root, alongside CMakeLists.txt) ───────────────────
# Processed by west/sysbuild before the application Kconfig.
# SB_CONFIG_ prefix = sysbuild-level symbol; never put these in prj.conf.

# Enable MCUboot as a child image. Sysbuild compiles it separately and wires
# it into the flash layout via Partition Manager.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Place the secondary slot (OTA download target) in external QSPI flash.
#
# Internal flash (1 MB) layout after this change:
#   MCUboot bootloader  ~64 KB
#   Primary slot        ~928 KB   ← running firmware lives here
#   NVS / storage        ~32 KB
#
# External QSPI flash (8 MB) layout:
#   Secondary slot      ~928 KB   ← downloaded firmware lands here
#   Remaining ~7 MB     free (logs, assets, future use)
#
# This almost doubles usable per-slot firmware space versus the original
# two-slot-in-internal-flash design. Flash budget constraint is lifted.
SB_CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y
SB_CONFIG_WIFI_NRF70=y
