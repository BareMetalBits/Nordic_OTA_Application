# =============================================================================
# prj.conf — OTA Client, Stage 7 (MCUboot + External QSPI Flash Download)
# Target : nrf7002dk/nrf5340/cpuapp     NCS : v3.2.4 / Zephyr 4.2.x
# =============================================================================

# ── Wi-Fi ─────────────────────────────────────────────────────────────────────
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y

# ── Wi-Fi Credentials & Auto-Connect ─────────────────────────────────────────
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_STATIC=y
CONFIG_WIFI_CREDENTIALS_STATIC_SSID="STECH"
CONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD="$tech1311"
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_L2_WIFI_CONNECTIVITY=y
CONFIG_L2_WIFI_CONNECTIVITY_AUTO_CONNECT=y

# ── Networking Stack ──────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_MGMT_EVENT_INFO=y

# ── DNS ───────────────────────────────────────────────────────────────────────
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_ADDITIONAL_BUF_CTR=5

# ── TLS ───────────────────────────────────────────────────────────────────────
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
# Two contexts: one for manifest fetch, one for firmware download.
# Both are sequential (never simultaneous), but the OS may not release
# the context instantly after close(). Two prevents ENOBUFS on rapid retries.
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=4
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y

# ── nRF Security (PSA backend) ────────────────────────────────────────────────
CONFIG_NRF_SECURITY=y
CONFIG_NRF_SECURITY_ADVANCED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
CONFIG_PSA_WANT_ECC_SECP_R1_384=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_MBEDTLS_MPI_MAX_SIZE=512
CONFIG_PSA_WANT_RSA_KEY_SIZE_4096=y

# SHA-256 via PSA — used for firmware read-back integrity check.
# Likely already selected by TLS dependencies, but made explicit here
# because we call psa_hash_setup(PSA_ALG_SHA_256) directly.
CONFIG_PSA_WANT_ALG_SHA_256=y

# ── NTP / Date-Time ───────────────────────────────────────────────────────────
CONFIG_SNTP=y
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_NTP=y

# ── JSON ──────────────────────────────────────────────────────────────────────
CONFIG_JSON_LIBRARY=y

# ── CRC32 ─────────────────────────────────────────────────────────────────────
# Enables crc32_ieee_update() for streaming CRC computed during download.
# Produces identical output to Python: binascii.crc32(data) & 0xFFFFFFFF
CONFIG_CRC=y

# ── MCUboot Integration (application side) ────────────────────────────────────
# Enables boot_request_upgrade() / boot_set_confirmed() in the application.
# The bootloader itself is built as a child image by sysbuild (sysbuild.conf).
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# ── External QSPI Flash — MX25R6435F (8 MB) ──────────────────────────────────
# Nordic QSPI NOR driver for the MX25R6435F on nRF7002DK.
#
# NOTE: The nRF7002 companion IC also uses QSPI. The board DTS defines both
# on the QSPI bus using separate chip-select lines. If you see DTS build
# errors about QSPI conflicts, check build/zephyr/zephyr.dts — the external
# flash node label there is the authoritative name to use in code.
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
# ── Flash Subsystem ───────────────────────────────────────────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# stream_flash: writes firmware to the secondary slot in 4 KB chunks using a
# small RAM buffer. CONFIG_STREAM_FLASH_ERASE=y auto-erases each 4 KB sector
# just before writing it, so no separate pre-erase loop is needed.
CONFIG_STREAM_FLASH=y
CONFIG_STREAM_FLASH_ERASE=y

# ── Reboot ────────────────────────────────────────────────────────────────────
CONFIG_REBOOT=y

# ── Memory ────────────────────────────────────────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=49152

# Stack increased from 4096: main() now runs flash erase/write, PSA hash
# over a 512-byte read buffer, and a 4096-byte recv loop. Zephyr's flash
# drivers allocate on the stack internally — 8 KB prevents stack overflow.
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=4096
CONFIG_DATE_TIME_THREAD_STACK_SIZE=3072

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_NET_LOG=n
CONFIG_DK_LIBRARY=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=y
# Size reductions for nrf52840dk MCUboot dual-slot builds.
CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n
CONFIG_PRINTK=y
CONFIG_CBPRINTF_NANO=y
CONFIG_LTO=y
# ── I2C Sensors (sensor_iface.c) ──────────────────────────────────────────────
# Generic Zephyr sensor subsystem — sensor_iface.c talks to every sensor
# through this same API (sensor_sample_fetch / sensor_channel_get), so adding
# a new I2C sensor never needs new bus-level code, only:
#   1. its devicetree node (see the .overlay file)
#   2. enabling its driver Kconfig symbol below
#   3. one entry in the `sensors[]` table in sensor_iface.c
CONFIG_I2C=y
CONFIG_SENSOR=y
 