
# ── sysbuild/mcuboot.conf ─────────────────────────────────────────────────────
# Kconfig overrides applied to the MCUboot child image ONLY.
# These settings do NOT affect the application image.

# MCUboot itself must access the secondary slot in external QSPI flash to
# verify and swap the downloaded firmware. Without this driver, MCUboot
# cannot see the secondary slot at all.
CONFIG_NORDIC_QSPI_NOR=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# MX25R6435F has 4 KB sectors. A ~928 KB slot needs ceil(928/4) = 232 sectors.
# 512 gives safe headroom. Setting this too low causes MCUboot to silently
# refuse to swap without an error message — the most confusing failure mode.
CONFIG_BOOT_MAX_IMG_SECTORS=512

# Disable serial recovery over UART. Not needed for Wi-Fi OTA; saves ~5 KB
# in the MCUboot image, freeing space in the bootloader region.
CONFIG_MCUBOOT_SERIAL=n
